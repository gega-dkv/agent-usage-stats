<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Usage Stats</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #0a0a0a;
        color: #fafafa;
      }
    </style>
  </head>
  <body>
    <p>Starting local dashboard…</p>
    <script>
      const port = 3847;
      const target = `http://127.0.0.1:${port}`;
      const timer = setInterval(() => {
        fetch(`${target}/api/stats`)
          .then((r) => {
            if (r.ok) {
              clearInterval(timer);
              window.location.replace(target);
            }
          })
          .catch(() => {});
      }, 400);
    </script>
  </body>
</html>
